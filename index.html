<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대화정리기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>대화정리기 v1.0.0</h1>

  <!-- 정리 타입 -->
  <div class="option-group">
    <div class="option-title">정리 타입</div>

    <label class="toggle">
      <input type="radio" name="mode" value="general" checked>
      <span>일반 모드</span>
    </label>

    <label class="toggle">
      <input type="radio" name="mode" value="kakao">
      <span>카카오톡 모드</span>
    </label>

    <label class="toggle">
      <input type="radio" name="mode" value="twitter">
      <span>트위터 멘션 모드</span>
    </label>

    <label class="toggle">
      <input type="radio" name="mode" value="role">
      <span>롤방 모드</span>
    </label>
  </div>

  <textarea id="inputText" placeholder="여기에 대화를 붙여넣으세요"></textarea>

  <!-- 화자 설정 -->
  <div class="option-group">
    <div class="option-title">화자 설정</div>

    <label class="toggle">
      <input type="checkbox" id="showSpeaker" checked>
      <span>화자 표시</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="colorSpeaker">
      <span>화자 색상 구분</span>
    </label>
  </div>

  <!-- 정리 옵션 -->
  <div class="option-group">
    <div class="option-title">정리 옵션</div>

    <label class="toggle">
      <input type="checkbox" id="removeTime">
      <span>시간 제거</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="removeLaugh">
      <span>ㅋㅋ/ㅎㅎ 제거</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="removeEmoji">
      <span>이모지 제거</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="compressLines">
      <span>자동 줄 압축</span>
    </label>
  </div>

  <button onclick="cleanText()">정리하기</button>
  <button class="sub-btn" onclick="copyText()">결과 복사</button>
  <button class="sub-btn" onclick="downloadTxt()">TXT 다운로드</button>

  <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
