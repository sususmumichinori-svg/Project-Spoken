<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOKEN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>대화정리기 v.1.0.0</h1>

<div class="intro">
  복잡한 채팅 로그를 깔끔하게 정리해주는 대화 정리 도구입니다.<br/>
  이름 제거, 시간 삭제, 같은 사람 대사 합치기 등을 지원합니다.<br/>
  최종수정일 2026-03-01
</div>

  <textarea id="inputText" placeholder="대화를 붙여넣으세요"></textarea>

  <div class="option-group">
    <div class="option-title">이름 설정</div>

    <label class="toggle">
      <input type="checkbox" id="showSpeaker" checked>
      <span>이름 유지</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="colorSpeaker">
      <span>이름 색상 구분</span>
    </label>
  </div>

  <div class="option-group">
    <div class="option-title">정리 옵션</div>

    <label class="toggle">
      <input type="checkbox" id="removeTime">
      <span>시간 제거</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="removeLaugh">
      <span>ㅋㅋ/ㅎㅎ 제거</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="removeEmoji">
      <span>이모지 제거</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="compressLines">
      <span>같은 사람 대사 합치기</span>
    </label>
  </div>

  <button onclick="cleanText()">정리하기</button>
  <button class="sub-btn" onclick="copyText()">복사</button>
  <button class="sub-btn" onclick="downloadTxt()">TXT 다운로드</button>

  <div id="output"></div>
</div>

<footer class="footer">
  <div>🩷 대화내용은 어디에도 저장되지 않습니다.🩷</div>
  <div>Built by @shokolabo · v1.0.0</div>
</footer>

<script src="script.js"></script>
</body>

</html>
