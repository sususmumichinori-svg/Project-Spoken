<body>

  <div class="container">
    <h1>Spoken Cleaner🧹</h1>
    <div class="version">v1.1.1</div>

    <div class="intro">
      카카오톡/디스코드 대화를 붙여넣으면 화자별로 깔끔하게 정리해드립니다.<br/> 
    </div>

    <textarea 
      id="inputText" 
      placeholder="카카오톡/디스코드 대화를 복사해서 붙여넣으세요."></textarea>

    <div class="privacy-note">

      입력한 대화 내용은 어디에도 저장되지 않으며<br/> 
      모든 처리는 사용자의 브라우저 내에서만 이루어집니다.<br/> 
    </div>

    <button class="main-btn" onclick="processText()">정리하기 ✨</button>

    <div id="output"></div>

    <div id="resultActions">
      <button onclick="copyText()">복사하기 📋</button>
      <button onclick="downloadTXT()">TXT 내보내기 💾</button>
    </div>
  </div>
