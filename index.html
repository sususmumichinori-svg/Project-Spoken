<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Spoken Cleaner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>💗 Spoken Cleaner 💗</h1>

    <textarea id="inputText" placeholder="카카오톡 대화를 복붙하세요"></textarea>

    <button class="main-btn" onclick="processText()">정리하기 ✨</button>

    <div id="output"></div>

    <!-- 결과 버튼 (처음엔 숨김) -->
    <div id="resultActions">
      <button onclick="copyText()">복사하기 📋</button>
      <button onclick="downloadTXT()">TXT 내보내기 💾</button>
    </div>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="footer-inner">
      <span>© 2026 Spoken Cleaner</span>
      <span class="divider">·</span>
      <span>Built by SHOKOLABO</span>
      <span class="divider">·</span>
      <a href="https://x.com/studymirae" target="studymirae">𝕏</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
