<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SPOKEN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <h1>SPOKEN</h1>
  <p class="intro">
    복잡한 채팅 로그를 정리해서<br>
    읽기 좋은 대화 형태로 바꿔드립니다.
  </p>

  <textarea id="inputText" placeholder="대화를 붙여넣으세요"></textarea>

  <div class="options">
    <label><input type="checkbox" id="compress" checked> 같은 사람 대사 합치기</label>
    <label><input type="checkbox" id="removeTime"> 시간 제거</label>
    <label><input type="checkbox" id="removeLaugh"> ㅋㅋ/ㅎㅎ 제거</label>
  </div>

  <button id="cleanBtn">정리하기</button>

  <!-- 🔥 결과 영역 (항상 존재) -->
  <div id="resultArea">
    <h2>정리 결과</h2>
    <div id="output"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
