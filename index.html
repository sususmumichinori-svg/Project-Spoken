<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Spoken - 대화정리기</title>

  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <h1>💗 대화정리기 💗</h1>

    <textarea id="inputText" placeholder="카카오톡 대화 복붙 ✨"></textarea>

    <button onclick="processText()">정리하기 💫</button>
